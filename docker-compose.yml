services:
  # Node 1 processor (default single-node setup)
  blah2_node1:
    restart: always
    build: .
    image: blah2
    tty: true
    depends_on:
      - blah2_api_node1
    volumes:
      - ./config:/blah2/config
      - ./save/node1:/blah2/save
      - /dev/shm:/dev/shm:rw
      - /dev/usb:/dev/usb:rw
    network_mode: host
    privileged: true
    command: "/blah2/bin/blah2 -c config/config.yml"
    container_name: blah2-node1

  # Node 1 API bridge
  blah2_api_node1:
    restart: always
    build: ./api
    image: blah2_api
    volumes:
      - ./config:/usr/src/app/config
    network_mode: host
    command: "node server.js /usr/src/app/config/config.yml"
    container_name: blah2-api-node1

  # UI ON/OFF TOGGLE:
  # - UI ON (default): keep this service block enabled.
  # - UI OFF (headless): comment out this entire service block.
  blah2_web_node1:
    restart: always
    image: httpd:2.4
    ports:
      - "49152:80"
    volumes:
      - ./html:/usr/local/apache2/htdocs
    container_name: blah2-web-node1

