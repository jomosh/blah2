<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>blah2</title>
  <!-- load lib js -->
  <script src="../../lib/bootstrap-5.2.3.min.js"></script>
  <script src="../../lib/plotly-2.20.0.min.js"></script>
  <script src="../../lib/jquery-3.6.4.min.js"></script>
  <!-- load lib css -->
  <link rel="stylesheet" href="../../lib/bootstrap-5.2.3.min.css">
  <link rel="stylesheet" href="../../lib/blah2.css">
  <style>
  </style>
</head>
<body>
  <div class="container-fluid" style="height: 100vh; width: 95vw">
    <div class="row g-2">
      <div class="col-lg-9">
        <div style="height: calc(100vh - 72px); width: 100%;" class="row d-flex">
          <div class="justify-content-center" id="data"></div>
        </div>
      </div>
      <div class="col-lg-3">
        <div style="height: calc(100vh - 72px); overflow-y: auto;" class="border rounded bg-dark p-2">
          <div class="mb-2">
            <label for="adsb-target-filter" class="form-label small mb-1 text-light">Filter ADS-B targets</label>
            <input id="adsb-target-filter" type="search" class="form-control form-control-sm" placeholder="Callsign or Hex ID" oninput="updateAdsbTargetTable()">
          </div>
          <table id="adsb-target-table" class="table table-sm table-dark table-hover mb-0">
            <thead>
              <tr>
                <th>Callsign</th>
                <th>Hex ID (ICAO)</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>
<script>
  var urlMap = '/stash/map';
</script>
