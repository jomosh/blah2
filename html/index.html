<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>blah2 | Live Radar Surface</title>
  <link rel="icon" type="image/x-icon" href="/favicon/favicon-16x16.png" sizes="16x16">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon-128x128.png" sizes="128x128">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon-196x196.png" sizes="196x196">
  <script src="./lib/bootstrap-5.2.3.min.js"></script>
  <script src="./lib/plotly-2.20.0.min.js"></script>
  <script src="./lib/jquery-3.6.4.min.js"></script>
  <link rel="stylesheet" href="./lib/bootstrap-5.2.3.min.css">
  <link rel="stylesheet" href="./lib/blah2.css?v=20260523h">
</head>
<body>
  <div class="app-shell app-shell--full">
    <main class="dashboard-grid">
      <section class="panel panel--plot">
        <div class="panel-toolbar">
          <div>
            <span class="panel-kicker">Display</span>
            <h2 class="panel-title">Delay-Doppler Map</h2>
          </div>
          <div class="toolbar-cluster">
            <div class="capture-card" data-iq-capture-control>
              <span class="small text-uppercase">IQ Capture</span>
              <span class="badge text-bg-secondary" data-iq-capture-status>Checking...</span>
              <button type="button" class="btn btn-sm btn-outline-secondary" data-iq-capture-toggle disabled>IQ Capture Unavailable</button>
            </div>
            <div class="export-actions">
              <button type="button" class="ghost-button" data-export-png>Export PNG</button>
              <button type="button" class="ghost-button" data-export-csv>Export CSV</button>
            </div>
          </div>
        </div>

        <div class="panel-meta-grid">
          <div class="live-panel" data-live-panel>
            <div class="live-main">
              <span class="status-pill" data-live-state>Waiting</span>
              <button type="button" class="ghost-button" data-live-toggle aria-pressed="false">Pause stream</button>
            </div>
            <p class="live-detail" data-live-detail>CPI unavailable</p>
            <div class="live-meta">
              <span data-live-updated>Waiting for first frame</span>
              <span data-live-next>Polling paused</span>
            </div>
          </div>

          <div class="metric-strip metric-strip--summary">
            <div class="metric-card">
              <span class="metric-label">Detections</span>
              <strong data-stat-value="detections">-</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">Tracks</span>
              <strong data-stat-value="tracks">-</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">ADS-B</span>
              <strong data-stat-value="adsb">-</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">Power Ceiling</span>
              <strong data-stat-value="power">-</strong>
            </div>
          </div>
        </div>

        <div class="plot-surface">
          <div class="plot-host" id="data"></div>
        </div>
      </section>

      <aside class="panel panel--sidebar">
        <div class="sidebar-stack">
          <section class="sidebar-card">
            <div>
              <label for="adsb-target-filter" class="form-label sidebar-filter-label">Filter ADS-B targets</label>
              <input id="adsb-target-filter" type="search" class="form-control form-control-sm" placeholder="Callsign or Hex ID" oninput="updateAdsbTargetTable()">
            </div>
            <div class="table-shell">
              <table id="adsb-target-table" class="table table-sm table-dark table-hover mb-0">
                <thead>
                  <tr>
                    <th>Callsign</th>
                    <th>Hex ID (ICAO)</th>
                    <th>Range (km)</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </section>
        </div>
      </aside>
    </main>
  </div>
</body>
<script>
  var urlMap = '/api/map';
</script>
<script src="js/common.js?v=20260523d"></script>
<script src="control.js"></script>
<script src="js/plot_map.js?v=20260523h"></script>
</html>
