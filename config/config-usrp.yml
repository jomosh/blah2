capture:
  fs: 2000000
  fc: 204640000
  device:
    type: "Usrp"
    address: "localhost"
    subdev: "A:A A:B"
    antenna: ["RX2", "RX2"]
    gain: [20.0, 20.0]
  replay:
    state: false
    loop: true
    file: '/opt/blah2/replay/file.rspduo'

process:
  data:
    cpi: 0.5
    buffer: 1.5
    overlap: 0
  ambiguity:
    delayMin: -10
    delayMax: 400
    dopplerMin: -200
    dopplerMax: 200
  clutter:
    enable: true
    delayMin: -10
    delayMax: 400
  detection:
    enable: true
    pfa: 0.00001
    nGuard: 2
    nTrain: 6
    minDelay: 5
    minDoppler: 15
    nCentroid: 6
  tracker:
    enable: true
    initiate:
      M: 3
      N: 5
      maxAcc: 10
    delete: 10
    smooth: "none"

network:
  ip: 0.0.0.0
  ports:
    api: 3000
    map: 3001
    detection: 3002
    track: 3003
    adsb: 3004
    timestamp: 4000
    timing: 4001
    iqdata: 4002
    config: 4003

learning:
  enabled: false      # true = learning mode, false = production
  path: ""           # optional path for learning log output
  schema_version: 2   # learning row schema version
  labeling_mode: "offline"   # none, offline, online_shadow
  logging:
    max_candidates: 0           # 0 = no cap
    include_tentative_tracks: true
    include_derived_features: true
  use_model: false     # apply inline model values in production
  model:
    type: "linear"   # currently only linear scoring supported
    threshold: 0.5
    weights:
      delay: 0.0
      doppler: 0.0
      snr: 1.0
    bias: 0.0

truth:
  adsb:
    enabled: false
    tar1090: 'adsb.30hours.dev'
    adsb2dd: 'adsb2dd.30hours.dev'
  ais:
    enabled: false
    ip: 0.0.0.0
    port: 30001

location:
  rx:
    latitude: -34.9286
    longitude: 138.5999
    altitude: 50
    name: "Adelaide"
  tx:
    latitude: -34.9810
    longitude: 138.7081
    altitude: 750
    name: "Mount Lofty"

save:
  iq: true
  map: false
  detection: false
  timing: false
  path: "/blah2/save/"
