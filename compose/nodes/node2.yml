services:
  blah2:
    volumes:
      - ./config:/blah2/config
      - ./save/node2:/blah2/save
      - /dev/shm:/dev/shm:rw
      - /dev/usb:/dev/usb:rw
    command: "/blah2/bin/blah2 -c config/config-node2-rspduo.yml"

  blah2_api:
    volumes:
      - ./config:/usr/src/app/config
    command: "node server.js /usr/src/app/config/config-node2-rspduo.yml"

  blah2_web:
    ports:
      - "49153:80"
